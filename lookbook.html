<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/assets/brand/favicon.svg" />
    <title>LOEM - Lookbook</title>
    <link rel="stylesheet" href="/styles/brand-story.css" />
  </head>

  <body class="lookbook-page">
    <div id="lightCursor" class="light-cursor" aria-hidden="true"></div>
    <div class="grain-overlay" aria-hidden="true"></div>
    <div class="top-fade-mask" aria-hidden="true"></div>

    <header class="top-nav">
      <a class="top-link js-nav" href="/brand-story">Brand Story</a>
      <a class="brand-lockup js-nav" href="/" aria-label="LOEM home">
        <img src="/assets/brand/Wordmark.svg" alt="LOEM wordmark" />
      </a>
      <span class="top-link top-link--current right" aria-current="page">
        Lookbook
      </span>
    </header>

    <main class="lookbook-shell" aria-label="Lookbook"></main>

    <footer class="site-footer">
      <a
        class="site-footer__link"
        href="http://forpeople.com/"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Forpeople"
      >
        <span
          class="site-footer__logo"
          role="img"
          aria-label="Forpeople"
        ></span>
        <span class="site-footer__year">&copy; 2026</span>
      </a>
    </footer>
    <script type="module" src="/scripts/brand-story.js"></script>
  </body>
</html>

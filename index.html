<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/assets/brand/favicon.svg">
    <title>Loēm Brand Lookbook</title>
    <style>
        @font-face {
            font-family: "Test Martina Plantijn";
            src: url("/assets/fonts/TestMartinaPlantijn-Light.otf") format("opentype");
            font-weight: 300;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: "Greed Condensed";
            src: url("/assets/fonts/Greed%20Condensed/GreedCondensed-TRIAL-SemiBold.otf") format("opentype");
            font-weight: 600;
            font-style: normal;
            font-display: swap;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
        }

        body {
            background:
                linear-gradient(115deg, #FFE9AC 0%, #F3E3BD 34%, #E2DBD5 66%, #CED2F1 100%);
            overflow: hidden;
            cursor: none;
            opacity: 0;
            isolation: isolate;
            position: relative;
            transition: opacity 620ms ease;
        }

        body.page-in {
            opacity: 1;
        }

        body.page-loading {
            opacity: 1;
        }

        body.page-out {
            opacity: 0;
        }

        .loading-screen {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: grid;
            place-items: center;
            background:
                linear-gradient(115deg, #FFE9AC 0%, #F3E3BD 34%, #E2DBD5 66%, #CED2F1 100%);
            opacity: 0;
            pointer-events: none;
            transition: opacity 480ms ease;
        }

        body.page-loading .loading-screen {
            opacity: 1;
            pointer-events: auto;
        }

        .loading-screen__progress {
            position: absolute;
            left: 50%;
            bottom: clamp(54px, 8.5vh, 92px);
            width: clamp(110px, 12vw, 230px);
            height: 2px;
            overflow: hidden;
            transform: translateX(-50%);
            background: rgba(39, 22, 15, 0.16);
        }

        .loading-screen__bar {
            width: 100%;
            height: 100%;
            transform: scaleX(0);
            transform-origin: left center;
            background: linear-gradient(90deg, #7886FA 0%, #27160F 100%);
            transition: transform 180ms ease;
        }

        canvas {
            position: fixed;
            inset: 0;
            display: block;
            pointer-events: none;
            z-index: 1;
        }

        .grain-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            opacity: 0.1;
            mix-blend-mode: soft-light;
            background-image: url("/assets/textures/noise.png");
            background-size: 250px 250px;
            background-repeat: repeat;
            transform: translateZ(0);
        }

        .light-cursor {
            position: fixed;
            top: 0;
            left: 0;
            width: clamp(180px, 22vw, 420px);
            height: clamp(180px, 22vw, 420px);
            border-radius: 50%;
            pointer-events: none;
            z-index: 5;
            transform: translate3d(-50%, -50%, 0) scale(0.9);
            background:
                radial-gradient(
                    closest-side at 50% 50%,
                    rgba(255, 255, 255, 0.68) 0%,
                    rgba(255, 255, 255, 0.36) 42%,
                    rgba(255, 255, 255, 0) 100%
                );
            mix-blend-mode: color-dodge;
            filter: blur(1.5px);
            opacity: 0;
            transition: opacity 360ms ease;
            will-change: transform, opacity;
            contain: layout style paint;
        }

        .light-cursor.is-visible {
            opacity: 1;
        }

        .scroll-snap {
            position: relative;
            z-index: 2;
            height: 100vh;
            overflow-y: auto;
            overflow-x: hidden;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-y: contain;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .scroll-snap::-webkit-scrollbar {
            display: none;
        }

        .snap-section {
            min-height: 100vh;
            scroll-snap-align: start;
            scroll-snap-stop: always;
        }


        .top-chrome {
            position: fixed;
            top: 52px;
            left: 28px;
            right: 28px;
            z-index: 4;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            pointer-events: none;
            opacity: 1;
            transform: translateY(0);
            transition: transform 360ms ease, opacity 320ms ease;
        }

        .top-chrome.is-hidden {
            opacity: 0;
            transform: translateY(-18px);
            pointer-events: none;
        }

        .top-chrome__slot {
            display: flex;
            align-items: center;
            pointer-events: none;
        }

        .top-chrome__slot--left {
            justify-content: flex-start;
        }

        .top-chrome__slot--center {
            justify-content: center;
        }

        .top-chrome__slot--right {
            justify-content: flex-end;
        }

        .top-chrome__btn {
            border: 0;
            background: transparent;
            color: #131313;
            font-family: "Greed Condensed", "Helvetica Neue", Arial, sans-serif;
            font-size: 16px;
            font-weight: 600;
            line-height: 1;
            letter-spacing: 0.02em;
            text-transform: uppercase;
            padding: 10px 14px;
            cursor: pointer;
            pointer-events: auto;
            transition: color 180ms ease;
        }

        .top-chrome__btn:hover {
            color: #ff9d00;
        }

        .top-chrome__btn:disabled,
        .final-actions__btn:disabled {
            color: #6f6a61;
            cursor: default;
        }

        .top-chrome__logo {
            width: clamp(80px, 9.5vw, 140px);
            height: auto;
            display: block;
            pointer-events: none;
        }

        .final-actions {
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%, 16px);
            z-index: 4;
            display: flex;
            gap: 16px;
            opacity: 0;
            pointer-events: none;
            transition: transform 320ms ease, opacity 280ms ease;
        }

        .final-actions.is-visible {
            transform: translate(-50%, 0);
            opacity: 1;
            pointer-events: auto;
        }

        .final-actions__btn {
            min-width: 180px;
            height: 48px;
            border: 0;
            background: transparent;
            color: #151515;
            font-family: "Greed Condensed", "Helvetica Neue", Arial, sans-serif;
            font-size: 16px;
            font-weight: 600;
            line-height: 1;
            letter-spacing: 0.02em;
            text-transform: uppercase;
            cursor: pointer;
            transition: color 180ms ease;
        }

        .final-actions__btn:hover {
            color: #ff9d00;
            
        }

        @media (max-width: 700px) {
            .top-chrome {
                top: 12px;
                left: 12px;
                right: 12px;
            }

            .top-chrome__btn {
                font-size: 13px;
                padding: 8px 10px;
            }

            .top-chrome__logo {
                width: clamp(55px, 17vw, 80px);
            }

            .final-actions {
                width: calc(100% - 24px);
                gap: 10px;
            }

            .final-actions__btn {
                min-width: 0;
                flex: 1 1 0;
                height: 42px;
                font-size: 15px;
            }
        }
    </style>
</head>

<body class="page-loading">
    <canvas id="c"></canvas>
    <div id="loadingScreen" class="loading-screen" aria-hidden="true">
        <div class="loading-screen__progress">
            <div id="loadingProgress" class="loading-screen__bar"></div>
        </div>
    </div>
    <div class="grain-overlay" aria-hidden="true"></div>
    <div id="lightCursor" class="light-cursor" aria-hidden="true"></div>
        <div id="topChrome" class="top-chrome" aria-hidden="false">
            <div class="top-chrome__slot top-chrome__slot--left">
                <button id="brandStoryTopBtn" class="top-chrome__btn" type="button">Brand Story</button>
            </div>
        <div class="top-chrome__slot top-chrome__slot--center">
            <img class="top-chrome__logo" src="/assets/brand/Wordmark.svg" alt="Loem wordmark">
        </div>
        <div class="top-chrome__slot top-chrome__slot--right">
            <button class="top-chrome__btn" type="button" disabled aria-disabled="true" title="Coming soon">Brand in Action</button>
        </div>
    </div>
    <div id="finalActions" class="final-actions" aria-hidden="true">
        <button id="brandStoryFinalBtn" class="final-actions__btn" type="button">Brand Story</button>
        <button class="final-actions__btn" type="button" disabled aria-disabled="true" title="Coming soon">Brand in Action</button>
    </div>
    <div id="scrollSnap" class="scroll-snap" aria-hidden="true">
        <section class="snap-section"></section>
        <section class="snap-section"></section>
        <section class="snap-section"></section>
        <section class="snap-section"></section>
        <section class="snap-section"></section>
        <section class="snap-section"></section>
        <section class="snap-section"></section>
    </div>
    <script type="module">
        import { animate } from "motion";

        const SECTION_TITLES = [
            "Section 1",
            "Section 2",
            "Section 3",
            "Section 4",
            "Section 5",
            "Section 6",
        ];

        const canvas = document.getElementById('c');
        const lightCursor = document.getElementById('lightCursor');
        const scrollSnap = document.getElementById('scrollSnap');
        const topChrome = document.getElementById('topChrome');
        const finalActions = document.getElementById('finalActions');
        const brandStoryTopBtn = document.getElementById('brandStoryTopBtn');
        const brandStoryFinalBtn = document.getElementById('brandStoryFinalBtn');
        const loadingProgress = document.getElementById('loadingProgress');
        const ctx = canvas.getContext('2d', { desynchronized: true });

        function navigateWithDissolve(href) {
            document.body.classList.add('page-out');
            setTimeout(() => {
                window.location.href = href;
            }, 520);
        }

        // Keep section count in sync with titles.
        scrollSnap.innerHTML = SECTION_TITLES
            .map((title) => `<section class="snap-section" aria-label="${title}"></section>`)
            .join('');

        let W = 0;
        let H = 0;
        let cx = 0;
        let cy = 0;
        let scrollProgress = 0;
        const scrollState = {
            renderProgress: 0,
            bgProgress: 0,
            currentSpin: 0,
        };
        let scrollMotionAnimation = null;
        let backgroundMotionAnimation = null;
        let scrollMotionFrame = null;
        let lastMotionTarget = 0;
        let idleTime = 0;
        let initialAssetsLoaded = 0;
        let initialAssetsTotal = 0;
        const initialAssetPromises = [];
        const cardRevealState = { progress: 0 };
        let cardRevealAnimation = null;
        let lastBackgroundProgress = null;
        const cursorState = {
            targetX: 0,
            targetY: 0,
            x: 0,
            y: 0,
            scale: 0.9,
            targetScale: 0.9,
            hasMoved: false,
        };
        const cameraWobble = {
            targetX: 0,
            targetY: 0,
            x: 0,
            y: 0,
        };

        const BASE_IMAGE_PATHS = [
            "/assets/images/landing/cards/Frame 2090055623.jpg",
            "/assets/images/landing/cards/Frame 2090055627.jpg",
            "/assets/images/landing/cards/Frame 2090055634.jpg",
            "/assets/images/landing/cards/Frame 2090055643.jpg",
            "/assets/images/landing/cards/Frame 2090055661.jpg",
            "/assets/images/landing/cards/Screenshot 2026-04-21 at 10.39.14 2.jpg",
            "/assets/images/landing/cards/e43fda12-4792-434d-8942-bc44fea8206f 2.jpg",
            "/assets/images/landing/cards/loreworld_1768413242_3810047991433109308_65923060496 9.jpg",
            "/assets/images/landing/cards/marvin-leuvrey_stills_025 4.jpg",
            "/assets/images/landing/cards/samuelpasquier_1691943848_3168577116093411413_9420069 5.jpg",
        ];
        const CENTER_VIDEO_PATH = "/assets/videos/landing/Loem-Black.mp4";
        const CENTER_VIDEO_FALLBACK_PATH = "/assets/videos/landing/A-Black.mp4";
        const CENTER_STEPS = [
            { type: 'text', text: "A modern living practice," },
            { type: 'text', text: "redefining daily essentials—for flow." },
            { type: 'text', text: "Where the mind awakens," },
            { type: 'text', text: "the self dissolves," },
            { type: 'text', text: "And everything moves effortlessly." },
            { type: 'video', videoPath: CENTER_VIDEO_PATH },
        ];
        const CENTER_SLIDE_DISTANCE_RATIO = 0.36;
        const BG_PALETTE = {
            warm: '#FFE9AC',
            cool: '#CED2F1',
        };
        const BG_SCENES = [
            { leftEdge: 0.03, left: 0.05, center: 0.08, right: 0.10, rightEdge: 0.14, glowX: 65, glowY: 44, glowBlend: 0.02, glowAlpha: 0.42, glowSize: 58 },
            { leftEdge: 0.03, left: 0.06, center: 0.13, right: 0.26, rightEdge: 0.36, glowX: 58, glowY: 43, glowBlend: 0.04, glowAlpha: 0.36, glowSize: 54 },
            { leftEdge: 0.04, left: 0.08, center: 0.34, right: 0.72, rightEdge: 0.90, glowX: 27, glowY: 45, glowBlend: 0.04, glowAlpha: 0.34, glowSize: 50 },
            { leftEdge: 0.12, left: 0.18, center: 0.52, right: 0.84, rightEdge: 0.96, glowX: 24, glowY: 43, glowBlend: 0.06, glowAlpha: 0.30, glowSize: 48 },
            { leftEdge: 0.94, left: 0.82, center: 0.62, right: 0.36, rightEdge: 0.16, glowX: 80, glowY: 45, glowBlend: 0.18, glowAlpha: 0.28, glowSize: 50 },
            { leftEdge: 0.99, left: 0.94, center: 0.82, right: 0.64, rightEdge: 0.36, glowX: 88, glowY: 45, glowBlend: 0.28, glowAlpha: 0.24, glowSize: 44 },
        ];

        const CARDS_PER_SECTION = 10;
        const SECTION_COUNT = SECTION_TITLES.length;
        const TOTAL_TURNS = 0.3;
        const TILT_X = 14 * Math.PI / 180;
        const PHASE_PER_SECTION = Math.PI * 0.4;
        const CENTER_DEPTH = 0.5;
        const SCROLL_EASE = [0.2, 0.95, 0.25, 1];
        const SCROLL_MOTION_DURATION = 0.16;
        const BG_MOTION_DURATION = 0.26;
        const MOTION_TARGET_EPSILON = 0.0002;
        const CARD_REVEAL_DURATION = 1.05;
        const CARD_TRANSITION_OPACITY_DROP = 0.22;
        const IDLE_START_DELTA = 0.00025;
        const IDLE_DRIFT_DELAY = 0.7;
        const IDLE_DRIFT_RAMP_DURATION = 2.4;
        const IDLE_DRIFT_X_RATIO = 0.0016;
        const IDLE_DRIFT_Y_RATIO = 0.0018;
        const CAMERA_WOBBLE_X_RATIO = 0.018;
        const CAMERA_WOBBLE_Y_RATIO = 0.014;
        const CAMERA_WOBBLE_SPIN = 0.026;
        const WORLD_RADIUS = 0.57;
        const HORIZONTAL_SPREAD = 1.9;
        const CARD_SIZE_BOOST = 1.68;
        const CORNER_BOOST_X_STRONG = 1.28;
        const CORNER_BOOST_Y_STRONG = 1.18;
        const CORNER_BOOST_X_SOFT = 1.14;
        const CORNER_BOOST_Y_SOFT = 1.08;
        const PHI = Math.PI * (3 - Math.sqrt(5));
        const cosT = Math.cos(TILT_X);
        const sinT = Math.sin(TILT_X);

        function smoothstep(v) {
            const t = Math.max(0, Math.min(1, v));
            return t * t * (3 - 2 * t);
        }

        function clamp(v, min, max) {
            return Math.max(min, Math.min(max, v));
        }

        function hexToRgb(hex) {
            const value = hex.replace('#', '').trim();
            const normalized = value.length === 3
                ? value.split('').map((ch) => ch + ch).join('')
                : value;
            const intVal = Number.parseInt(normalized, 16);
            return {
                r: (intVal >> 16) & 255,
                g: (intVal >> 8) & 255,
                b: intVal & 255,
            };
        }

        function mixColor(aHex, bHex, t) {
            const a = hexToRgb(aHex);
            const b = hexToRgb(bHex);
            return {
                r: Math.round(a.r + (b.r - a.r) * t),
                g: Math.round(a.g + (b.g - a.g) * t),
                b: Math.round(a.b + (b.b - a.b) * t),
            };
        }

        function toRgba(color, alpha) {
            return `rgba(${color.r}, ${color.g}, ${color.b}, ${clamp(alpha, 0, 1).toFixed(3)})`;
        }

        function paletteColor(blend, alpha = 1) {
            return toRgba(
                mixColor(BG_PALETTE.warm, BG_PALETTE.cool, clamp(blend, 0, 1)),
                alpha
            );
        }

        function lerp(a, b, t) {
            return a + (b - a) * t;
        }

        function blendScene(from, to, t) {
            return {
                leftEdge: lerp(from.leftEdge, to.leftEdge, t),
                left: lerp(from.left, to.left, t),
                center: lerp(from.center, to.center, t),
                right: lerp(from.right, to.right, t),
                rightEdge: lerp(from.rightEdge, to.rightEdge, t),
                glowX: lerp(from.glowX, to.glowX, t),
                glowY: lerp(from.glowY, to.glowY, t),
                glowBlend: lerp(from.glowBlend, to.glowBlend, t),
                glowAlpha: lerp(from.glowAlpha, to.glowAlpha, t),
                glowSize: lerp(from.glowSize, to.glowSize, t),
            };
        }

        function updateDynamicBackground() {
            const sceneProgress = clamp(scrollState.bgProgress, 0, 1);
            if (lastBackgroundProgress !== null && Math.abs(sceneProgress - lastBackgroundProgress) < 0.0005) return;
            lastBackgroundProgress = sceneProgress;

            const sceneFloat = sceneProgress * (BG_SCENES.length - 1);
            const fromIndex = clamp(Math.floor(sceneFloat), 0, BG_SCENES.length - 1);
            const toIndex = Math.min(fromIndex + 1, BG_SCENES.length - 1);
            const scene = blendScene(BG_SCENES[fromIndex], BG_SCENES[toIndex], smoothstep(sceneFloat - fromIndex));

            document.body.style.background = [
                `radial-gradient(circle at ${scene.glowX.toFixed(2)}% ${scene.glowY.toFixed(2)}%, ${paletteColor(scene.glowBlend, scene.glowAlpha)} 0%, ${paletteColor(scene.glowBlend + 0.08, scene.glowAlpha * 0.5)} ${scene.glowSize.toFixed(2)}%, ${paletteColor(scene.glowBlend + 0.12, 0)} 74%)`,
                `linear-gradient(115deg, ${paletteColor(scene.leftEdge, 0.72)} 0%, ${paletteColor(scene.left, 0.72)} 18%, ${paletteColor(scene.center, 0.72)} 48%, ${paletteColor(scene.right, 0.72)} 78%, ${paletteColor(scene.rightEdge, 0.72)} 100%)`,
                `linear-gradient(90deg, ${paletteColor(scene.leftEdge)} 0%, ${paletteColor((scene.left + scene.center) * 0.5)} 36%, ${paletteColor((scene.center + scene.right) * 0.5)} 64%, ${paletteColor(scene.rightEdge)} 100%)`,
            ].join(', ');
        }

        function resize() {
            const dpr = window.devicePixelRatio || 1;
            W = window.innerWidth;
            H = window.innerHeight;
            canvas.width = W * dpr;
            canvas.height = H * dpr;
            canvas.style.width = `${W}px`;
            canvas.style.height = `${H}px`;
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'medium';
            cx = W / 2;
            cy = H / 2;
        }

        function getScrollMax() {
            return Math.max(1, scrollSnap.scrollHeight - scrollSnap.clientHeight);
        }

        function updateScrollProgress() {
            scrollProgress = scrollSnap.scrollTop / getScrollMax();
        }

        function updateLoadingProgress() {
            if (!loadingProgress || initialAssetsTotal === 0) return;
            const progress = clamp(initialAssetsLoaded / initialAssetsTotal, 0, 1);
            loadingProgress.style.transform = `scaleX(${progress.toFixed(3)})`;
        }

        function trackInitialAsset(promise) {
            initialAssetsTotal += 1;
            updateLoadingProgress();
            const tracked = promise
                .catch(() => {})
                .finally(() => {
                    initialAssetsLoaded += 1;
                    updateLoadingProgress();
                });
            initialAssetPromises.push(tracked);
            return tracked;
        }

        function revealLandingWhenReady() {
            Promise.all(initialAssetPromises).finally(() => {
                document.body.classList.add('page-in');
                requestAnimationFrame(() => {
                    document.body.classList.remove('page-loading');
                    cardRevealAnimation?.stop();
                    cardRevealState.progress = 0;
                    cardRevealAnimation = animate(
                        cardRevealState,
                        { progress: 1 },
                        {
                            duration: CARD_REVEAL_DURATION,
                            ease: SCROLL_EASE,
                        }
                    );
                });
            });
        }

        function syncScrollStateToProgress() {
            scrollMotionAnimation?.stop();
            backgroundMotionAnimation?.stop();
            scrollMotionFrame = null;
            lastMotionTarget = scrollProgress;
            scrollState.renderProgress = scrollProgress;
            scrollState.bgProgress = scrollProgress;
            scrollState.currentSpin = scrollProgress * Math.PI * 2 * TOTAL_TURNS;
        }

        function animateScrollStateToProgress() {
            if (Math.abs(scrollProgress - lastMotionTarget) < MOTION_TARGET_EPSILON) return;
            lastMotionTarget = scrollProgress;
            const targetSpin = scrollProgress * Math.PI * 2 * TOTAL_TURNS;

            scrollMotionAnimation?.stop();
            backgroundMotionAnimation?.stop();

            scrollMotionAnimation = animate(
                scrollState,
                {
                    renderProgress: scrollProgress,
                    currentSpin: targetSpin,
                },
                {
                    duration: SCROLL_MOTION_DURATION,
                    ease: SCROLL_EASE,
                }
            );

            backgroundMotionAnimation = animate(
                scrollState,
                { bgProgress: scrollProgress },
                {
                    duration: BG_MOTION_DURATION,
                    ease: SCROLL_EASE,
                }
            );
        }

        function scheduleScrollMotion() {
            if (scrollMotionFrame !== null) return;

            scrollMotionFrame = requestAnimationFrame(() => {
                scrollMotionFrame = null;
                animateScrollStateToProgress();
            });
        }

        function sectionPhase(index) {
            return index * PHASE_PER_SECTION;
        }

        function updateFinalActions(sectionFloat) {
            const threshold = SECTION_TITLES.length - 1.05;
            const inFinalZone = sectionFloat >= threshold;

            if (inFinalZone && !finalActionsReady) {
                if (finalActionsDelayConsumed) {
                    finalActionsReady = true;
                } else if (!finalActionsDelayStarted) {
                    finalActionsDelayStarted = true;
                    finalActionsDelayTimer = setTimeout(() => {
                        finalActionsReady = true;
                        finalActionsDelayConsumed = true;
                    }, 2000);
                }
            }

            if (!inFinalZone) {
                finalActionsReady = false;
                finalActionsDelayStarted = false;
                if (finalActionsDelayTimer) {
                    clearTimeout(finalActionsDelayTimer);
                    finalActionsDelayTimer = null;
                }
            }

            const isVisible = inFinalZone && finalActionsReady;
            finalActions.classList.toggle('is-visible', isVisible);
            finalActions.setAttribute('aria-hidden', isVisible ? 'false' : 'true');
        }

        function updateFinalActionsPosition() {
            // Keep CTA row anchored right under the final center logo.
            const targetH = clamp(H * 0.144, 54, 144);
            const y = cy + targetH / 2 + clamp(H * 0.055, 26, 56);
            finalActions.style.top = `${Math.round(y)}px`;
        }

        function updateTopChrome(sectionFloat) {
            const threshold = SECTION_TITLES.length - 1.05;
            const isHidden = sectionFloat >= threshold;
            topChrome.classList.toggle('is-hidden', isHidden);
            topChrome.setAttribute('aria-hidden', isHidden ? 'true' : 'false');
        }

        function createImageAsset(path) {
            const img = new Image();
            img.decoding = 'async';
            img.loading = 'eager';
            img.src = encodeURI(path);
            trackInitialAsset(
                img.decode
                    ? img.decode()
                    : new Promise((resolve) => {
                        img.addEventListener('load', resolve, { once: true });
                        img.addEventListener('error', resolve, { once: true });
                    })
            );
            return img;
        }

        const baseAssets = BASE_IMAGE_PATHS.map((path) => createImageAsset(path));
        if (document.fonts?.ready) {
            trackInitialAsset(document.fonts.ready);
        }
        const centerVideoAsset = document.createElement('video');
        centerVideoAsset.src = CENTER_VIDEO_PATH;
        centerVideoAsset.muted = true;
        centerVideoAsset.playsInline = true;
        centerVideoAsset.preload = 'auto';
        centerVideoAsset.loop = false;
        centerVideoAsset.addEventListener('error', () => {
            if (centerVideoAsset.src.includes(CENTER_VIDEO_FALLBACK_PATH)) return;
            centerVideoAsset.src = CENTER_VIDEO_FALLBACK_PATH;
            centerVideoAsset.load();
        });

        let wasInLastSection = false;
        let centerVideoHasPlayedOnce = false;
        let finalActionsReady = false;
        let finalActionsDelayStarted = false;
        let finalActionsDelayTimer = null;
        let finalActionsDelayConsumed = false;
        const videoKeyCanvas = document.createElement('canvas');
        const videoKeyCtx = videoKeyCanvas.getContext('2d', { willReadFrequently: true });

        const particles = Array.from({ length: CARDS_PER_SECTION }, (_, i) => {
            // Use midpoint sampling so first/last cards are not stuck on the poles.
            const y = 1 - ((i + 0.5) / CARDS_PER_SECTION) * 2;
            const r = Math.sqrt(Math.max(0, 1 - y * y));
            const theta = PHI * i;
            const baseW = 148 + (i % 4) * 16;
            const baseH = baseW * (1.25 + (i % 3) * 0.08);
            const edgeSeed = (i * 17 + 11) % 12;
            let orbitX = 1;
            let orbitY = 1;
            if (edgeSeed < 4) {
                orbitX = CORNER_BOOST_X_STRONG;
                orbitY = CORNER_BOOST_Y_STRONG;
            } else if (edgeSeed < 7) {
                orbitX = CORNER_BOOST_X_SOFT;
                orbitY = CORNER_BOOST_Y_SOFT;
            }
            return {
                x: r * Math.cos(theta),
                y: y * 0.66,
                z: r * Math.sin(theta),
                baseW,
                baseH,
                orbitX,
                orbitY,
                slot: i,
            };
        });

        const baseMediaOrder = (() => {
            const total = baseAssets.length;
            return Array.from({ length: CARDS_PER_SECTION }, (_, slot) => {
                const imageIndex = slot % total;
                return {
                    img: baseAssets[imageIndex],
                    assetPath: BASE_IMAGE_PATHS[imageIndex],
                    flipX: (slot % 3) === 0,
                    flipY: (slot % 5) === 0,
                    label: String(slot + 1).padStart(2, '0'),
                };
            });
        })();

        function createSectionMedia() {
            const media = baseMediaOrder.map((item) => ({ ...item }));
            if (media[0]) {
                media[0] = {
                    ...media[0],
                    flipX: false,
                    flipY: false,
                };
            }
            if (media[3]) {
                media[3] = {
                    ...media[3],
                    flipX: false,
                    flipY: false,
                };
            }
            if (media[2]) {
                media[2] = {
                    ...media[2],
                    shiftXPx: -300,
                };
            
         
            }
            if (media[6]) {
                media[6] = {
                    ...media[6],
                    shiftXPx: 620,
                    shiftYPx: -70,
                };
            }
            // Keep this one non-mirrored.
            media.forEach((entry, index) => {
                if (entry.assetPath && entry.assetPath.includes('Frame 2090055643.jpg')) {
                    media[index] = {
                        ...entry,
                        flipX: false,
                        flipY: false,
                    };
                }
            });
            return media;
        }

        const sectionMedia = SECTION_TITLES.map(() => createSectionMedia());

        function drawCard(media, sx, sy, w, h, opacity, blur) {
            if (opacity < 0.01) return;
            ctx.save();
            ctx.globalAlpha = opacity;
            const cardBlur = media.disableBlur ? 0 : blur;
            if (cardBlur > 0.2) ctx.filter = `blur(${cardBlur.toFixed(2)}px)`;
            const hw = w / 2;
            const hh = h / 2;
            if (!media.transparentBg) {
                ctx.fillStyle = '#d9d2c8';
                ctx.fillRect(sx - hw, sy - hh, w, h);
            }
            ctx.save();
            ctx.beginPath();
            ctx.rect(sx - hw, sy - hh, w, h);
            ctx.clip();
            const img = media.img;
            const loaded = img && img.complete && img.naturalWidth > 0;
            if (loaded) {
                const s = media.fitMode === 'contain'
                    ? Math.min(w / img.naturalWidth, h / img.naturalHeight)
                    : Math.max(w / img.naturalWidth, h / img.naturalHeight);
                const drawW = img.naturalWidth * s;
                const drawH = img.naturalHeight * s;

                if (media.flipX || media.flipY) {
                    ctx.translate(sx, sy);
                    ctx.scale(media.flipX ? -1 : 1, media.flipY ? -1 : 1);
                    ctx.drawImage(img, -drawW / 2, -drawH / 2, drawW, drawH);
                } else {
                    ctx.drawImage(img, sx - drawW / 2, sy - drawH / 2, drawW, drawH);
                }
            } else {
                ctx.fillStyle = media.transparentBg ? 'rgba(255,255,255,0.35)' : '#c8c1b6';
                ctx.fillRect(sx - hw, sy - hh, w, h);
                if (media.transparentBg) {
                    ctx.strokeStyle = 'rgba(0, 0, 0, 0.24)';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(sx - hw, sy - hh, w, h);
                }
            }

            ctx.restore();
            ctx.restore();
        }

        function drawBadgeOverlay(media, sx, sy, w, h, opacity) {
            return;
        }

        function projectLayer(sectionIndex, spinRad, phaseOffset, layerAlpha, idleAmount) {
            const wobbleSpin = cameraWobble.x * CAMERA_WOBBLE_SPIN;
            const cosS = Math.cos(spinRad + phaseOffset + wobbleSpin);
            const sinS = Math.sin(spinRad + phaseOffset + wobbleSpin);
            const R = Math.min(W, H) * WORLD_RADIUS;
            const wobbleX = cameraWobble.x * clamp(W * CAMERA_WOBBLE_X_RATIO, 10, 34);
            const wobbleY = cameraWobble.y * clamp(H * CAMERA_WOBBLE_Y_RATIO, 8, 26);

            return particles.map((p) => {
                const rx = p.x * cosS - p.z * sinS;
                const ry = p.y;
                const rz = p.x * sinS + p.z * cosS;
                const fy = ry * cosT - rz * sinT;
                const fz = ry * sinT + rz * cosT;

                const rawSx = cx + rx * R * HORIZONTAL_SPREAD * p.orbitX;
                const rawSy = cy + fy * R * p.orbitY;
                const depth = (fz + 1) / 2;
                const media = sectionMedia[sectionIndex][p.slot];
                const shiftX = ((media.shiftXRatio || 0) * W) + (media.shiftXPx || 0);
                const shiftY = ((media.shiftYRatio || 0) * H) + (media.shiftYPx || 0);
                const mediaScale = media.scale || 1;
                const sizeF = (0.38 + depth * 0.95) * CARD_SIZE_BOOST;
                const w = p.baseW * sizeF * mediaScale;
                const h = p.baseH * sizeF * mediaScale;
                const slotSeed = p.slot * 0.91 + 0.37;
                const idleWaveX = Math.sin(idleTime * 0.36 + slotSeed) * clamp(W * IDLE_DRIFT_X_RATIO, 0.8, 3.2) * idleAmount;
                const idleWaveY = Math.cos(idleTime * 0.42 + slotSeed * 1.3) * clamp(H * IDLE_DRIFT_Y_RATIO, 0.8, 3.0) * idleAmount;
                const depthWobble = 0.38 + depth * 0.72;
                const sx = rawSx + shiftX + idleWaveX - wobbleX * depthWobble;
                const sy = rawSy + shiftY + idleWaveY - wobbleY * depthWobble;

                const boostedDepth = clamp(depth + (media.layerBoost || 0), 0, 1);
                const renderDepth = media.forceFront ? 2 + boostedDepth : boostedDepth;
                const nt = smoothstep(boostedDepth);
                const opacity = clamp((media.forceOpacity ?? 1) * layerAlpha, 0, 1);
                const blur = 0;

                return {
                    sx,
                    sy,
                    w,
                    h,
                    depth: renderDepth,
                    opacity,
                    blur,
                    media,
                };
            });
        }

        function onScroll() {
            updateScrollProgress();
            scheduleScrollMotion();
        }

        function onWheel() {
            requestAnimationFrame(() => {
                updateScrollProgress();
                scheduleScrollMotion();
            });
        }

        function updateLightCursorTarget(clientX, clientY) {
            cursorState.targetX = clientX;
            cursorState.targetY = clientY;
            cursorState.targetScale = 1;
            if (!cursorState.hasMoved) {
                cursorState.x = clientX;
                cursorState.y = clientY;
                cursorState.hasMoved = true;
            }
        }

        function renderLightCursor() {
            if (!cursorState.hasMoved) return;
            cursorState.x += (cursorState.targetX - cursorState.x) * 0.16;
            cursorState.y += (cursorState.targetY - cursorState.y) * 0.16;
            cursorState.scale += (cursorState.targetScale - cursorState.scale) * 0.12;
            cameraWobble.targetX = clamp((cursorState.x - cx) / Math.max(1, W * 0.5), -1, 1);
            cameraWobble.targetY = clamp((cursorState.y - cy) / Math.max(1, H * 0.5), -1, 1);
            cameraWobble.x += (cameraWobble.targetX - cameraWobble.x) * 0.08;
            cameraWobble.y += (cameraWobble.targetY - cameraWobble.y) * 0.08;
            lightCursor.style.transform = `translate3d(${cursorState.x.toFixed(2)}px, ${cursorState.y.toFixed(2)}px, 0) translate(-50%, -50%) scale(${cursorState.scale.toFixed(3)})`;
        }

        window.addEventListener('mousemove', (event) => {
            updateLightCursorTarget(event.clientX, event.clientY);
            lightCursor.classList.add('is-visible');
        }, { passive: true });

        window.addEventListener('mouseenter', (event) => {
            updateLightCursorTarget(event.clientX, event.clientY);
            lightCursor.classList.add('is-visible');
        }, { passive: true });

        window.addEventListener('mouseleave', () => {
            cursorState.targetScale = 0.9;
            lightCursor.classList.remove('is-visible');
        }, { passive: true });

        brandStoryTopBtn?.addEventListener('click', () => {
            navigateWithDissolve('/brand-story.html');
        });
        brandStoryFinalBtn?.addEventListener('click', () => {
            navigateWithDissolve('/brand-story.html');
        });

        function buildCenteredLines(text, maxWidth) {
            const words = text.split(/\s+/);
            let line = '';
            const lines = [];
            for (let i = 0; i < words.length; i += 1) {
                const testLine = line ? `${line} ${words[i]}` : words[i];
                if (ctx.measureText(testLine).width > maxWidth && line) {
                    lines.push(line);
                    line = words[i];
                } else {
                    line = testLine;
                }
            }
            if (line) {
                lines.push(line);
            }
            return lines;
        }

        function drawCenterStep(step, centerX, alpha) {
            if (!step || alpha < 0.01) return;
            ctx.save();
            ctx.globalAlpha = clamp(alpha, 0, 1);
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = 'rgba(17, 17, 17, 0.98)';
            ctx.shadowColor = 'rgba(0,0,0,0.08)';
            ctx.shadowBlur = 8;

            if (step.type === 'video') {
                const video = centerVideoAsset;
                const loaded = video && video.readyState >= 2 && video.videoWidth > 0 && video.videoHeight > 0;
                if (loaded) {
                    const targetW = clamp(W * 0.32, 180, 460);
                    const targetH = clamp(H * 0.22, 110, 320);
                    const scale = Math.min(targetW / video.videoWidth, targetH / video.videoHeight);
                    const drawW = video.videoWidth * scale;
                    const drawH = video.videoHeight * scale;
                    // Key out near-white at display size to avoid processing full source frames.
                    const keyW = Math.max(1, Math.round(drawW));
                    const keyH = Math.max(1, Math.round(drawH));
                    if (videoKeyCanvas.width !== keyW || videoKeyCanvas.height !== keyH) {
                        videoKeyCanvas.width = keyW;
                        videoKeyCanvas.height = keyH;
                    }
                    videoKeyCtx.clearRect(0, 0, keyW, keyH);
                    videoKeyCtx.drawImage(video, 0, 0, keyW, keyH);
                    const frame = videoKeyCtx.getImageData(0, 0, keyW, keyH);
                    const px = frame.data;
                    for (let i = 0; i < px.length; i += 4) {
                        const r = px[i];
                        const g = px[i + 1];
                        const b = px[i + 2];
                        const max = Math.max(r, g, b);
                        const min = Math.min(r, g, b);
                        const brightness = (r + g + b) / 3;
                        const saturation = max - min;
                        if (brightness > 225 && saturation < 36) {
                            px[i + 3] = 0;
                        } else if (brightness > 205 && saturation < 52) {
                            const keep = clamp((225 - brightness) / 20, 0, 1);
                            px[i + 3] = Math.round(px[i + 3] * keep);
                        }
                    }
                    videoKeyCtx.putImageData(frame, 0, 0);
                    ctx.drawImage(videoKeyCanvas, centerX - drawW / 2, cy - drawH / 2, drawW, drawH);
                }
                ctx.restore();
                return;
            }

            const text = (step.text || '').trim();
            const fontSize = clamp(W * 0.0213, 16, 38);
            const lineHeight = Math.round(fontSize * 1.1);
            const maxWidth = clamp(W * 0.72, 320, 1060);
            ctx.font = `300 ${fontSize}px "Test Martina Plantijn", Georgia, "Times New Roman", serif`;
            const lines = buildCenteredLines(text, maxWidth);
            const startY = cy - ((lines.length - 1) * lineHeight) / 2;
            lines.forEach((line, idx) => {
                ctx.fillText(line, centerX, startY + idx * lineHeight);
            });
            ctx.restore();
        }

        function drawCenterTransition(currentIndex, nextIndex, mix) {
            const currentStep = CENTER_STEPS[currentIndex];
            const nextStep = CENTER_STEPS[nextIndex];
            const slideDistance = clamp(W * CENTER_SLIDE_DISTANCE_RATIO, 180, 460);
            const inShift = slideDistance * (1 - mix);
            const outShift = slideDistance * mix;
            const currentX = cx - outShift;
            const nextX = cx + inShift;

            drawCenterStep(currentStep, currentX, 1 - mix);
            if (nextIndex !== currentIndex) {
                drawCenterStep(nextStep, nextX, mix);
            }
        }

        function drawCenterStepper(sectionFloat) {
            const totalSteps = SECTION_TITLES.length;
            if (totalSteps <= 1) return;

            const progress = clamp(sectionFloat / (totalSteps - 1), 0, 1);
            const fadeOutStart = totalSteps - 1.15;
            const alpha = sectionFloat >= fadeOutStart
                ? clamp((totalSteps - 1 - sectionFloat) / (totalSteps - 1 - fadeOutStart), 0, 1)
                : 1;
            if (alpha <= 0.001) return;
            const trackW = clamp(W * 0.12, 110, 230);
            const trackH = 2;
            const x = cx - trackW / 2;
            const y = H - clamp(H * 0.085, 54, 92) - trackH;
            const fillW = Math.max(2, trackW * progress);
            const fillGradient = ctx.createLinearGradient(x, y, x + trackW, y);
            fillGradient.addColorStop(0, '#7886FA');
            fillGradient.addColorStop(1, '#27160F');

            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.fillStyle = 'rgba(39, 22, 15, 0.16)';
            ctx.fillRect(x, y, trackW, trackH);
            ctx.fillStyle = fillGradient;
            ctx.fillRect(x, y, fillW, trackH);
            ctx.restore();
        }

        function getFinalCardsExitProgress(sectionFloat) {
            const lastIndex = SECTION_TITLES.length - 1;
            const start = lastIndex - 0.9;
            const end = lastIndex;
            const t = clamp((sectionFloat - start) / Math.max(0.001, end - start), 0, 1);
            return smoothstep(t);
        }

        function updateCenterVideoPlayback(sectionFloat) {
            const lastIndex = SECTION_TITLES.length - 1;
            const arrivedLastSection = sectionFloat >= lastIndex - 0.02;

            if (arrivedLastSection && !wasInLastSection && !centerVideoHasPlayedOnce) {
                centerVideoAsset.play()
                    .then(() => {
                        centerVideoHasPlayedOnce = true;
                    })
                    .catch(() => {});
            }
            wasInLastSection = arrivedLastSection;
        }

        function applyFinalCardsExit(card, exitProgress) {
            if (exitProgress <= 0.001) return card;
            const dx = card.sx - cx;
            const dy = card.sy - cy;
            const outward = 0.06 + exitProgress * 0.1;
            const upLift = clamp(H * 0.03, 16, 34) * exitProgress;
            return {
                ...card,
                sx: card.sx + dx * outward * exitProgress,
                sy: card.sy + dy * outward * exitProgress - upLift,
                opacity: card.opacity * (1 - exitProgress),
                blur: exitProgress * 0.35,
            };
        }

        function renderCardForExit(card, exitProgress) {
            return exitProgress <= 0.001 ? card : applyFinalCardsExit(card, exitProgress);
        }

        function drawCardPass(cards, exitProgress, drawFront) {
            for (let i = 0; i < cards.length; i += 1) {
                const card = renderCardForExit(cards[i], exitProgress);
                const isFront = card.depth >= CENTER_DEPTH;
                if (isFront !== drawFront) continue;
                drawCard(card.media, card.sx, card.sy, card.w, card.h, card.opacity, card.blur);
            }
        }

        function drawCardBadges(cards, exitProgress) {
            for (let i = 0; i < cards.length; i += 1) {
                const card = renderCardForExit(cards[i], exitProgress);
                drawBadgeOverlay(card.media, card.sx, card.sy, card.w, card.h, card.opacity);
            }
        }

        let lastTime = performance.now();
        function frame(now) {
            const dt = Math.min(now - lastTime, 50);
            lastTime = now;

            const renderProgress = scrollState.renderProgress;
            const currentSpin = scrollState.currentSpin;
            renderLightCursor();
            const settleDelta = Math.abs(scrollProgress - renderProgress);
            const isIdle = settleDelta < IDLE_START_DELTA;
            idleTime = isIdle ? idleTime + dt * 0.001 : 0;
            const idleRamp = clamp((idleTime - IDLE_DRIFT_DELAY) / IDLE_DRIFT_RAMP_DURATION, 0, 1);
            const idleAmount = isIdle ? smoothstep(idleRamp) : 0;

            const sectionFloat = renderProgress * (SECTION_TITLES.length - 1);
            const currentIndex = Math.floor(sectionFloat);
            const nextIndex = Math.min(currentIndex + 1, SECTION_TITLES.length - 1);
            const mix = smoothstep(sectionFloat - currentIndex);
            const transitionOpacity = 1 - CARD_TRANSITION_OPACITY_DROP * Math.sin(Math.PI * clamp(sectionFloat - currentIndex, 0, 1));
            const cardLayerAlpha = smoothstep(cardRevealState.progress) * transitionOpacity;
            updateFinalActions(sectionFloat);
            updateFinalActionsPosition();
            updateTopChrome(sectionFloat);
            updateCenterVideoPlayback(sectionFloat);
            updateDynamicBackground();
            const phaseCurrent = sectionPhase(currentIndex);
            const phaseNext = sectionPhase(nextIndex);
            const blendedPhase = phaseCurrent + (phaseNext - phaseCurrent) * mix;
            const allCards = projectLayer(0, currentSpin, blendedPhase, cardLayerAlpha, idleAmount).sort((a, b) => a.depth - b.depth);
            const finalCardsExit = getFinalCardsExitProgress(sectionFloat);

            ctx.clearRect(0, 0, W, H);

            drawCardPass(allCards, finalCardsExit, false);

            drawCenterTransition(currentIndex, nextIndex, mix);
            drawCenterStepper(sectionFloat);

            drawCardPass(allCards, finalCardsExit, true);

            // Keep numbering always readable on top of everything.
            drawCardBadges(allCards, finalCardsExit);

            requestAnimationFrame(frame);
        }

        resize();
        updateScrollProgress();
        syncScrollStateToProgress();
        scrollSnap.addEventListener('scroll', onScroll, { passive: true });
        scrollSnap.addEventListener('wheel', onWheel, { passive: true });
        window.addEventListener('resize', () => {
            resize();
            updateScrollProgress();
            syncScrollStateToProgress();
        });
        requestAnimationFrame(() => {
            updateScrollProgress();
            syncScrollStateToProgress();
        });
        revealLandingWhenReady();
        requestAnimationFrame(frame);
    </script>
</body>
